<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Painting Sketch Overlay</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #111; color: #fff; min-height: 100vh; overflow: hidden; }
#app { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #111; }
#video { width: 100%; height: 100%; object-fit: cover; display: block; }
#overlay-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
#peek-bar { position: absolute; bottom: 0; left: 0; right: 0; display: none; justify-content: center; align-items: center; padding: 10px 10px 32px; background: linear-gradient(transparent, rgba(0,0,0,0.6)); }
#peek-btn { font-size: 13px; padding: 7px 28px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.35); background: rgba(0,0,0,0.55); color: #fff; cursor: pointer; }
#controls { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(20,20,20,0.95); padding: 12px 16px 32px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; backdrop-filter: blur(8px); }
.ctrl-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 130px; }
.ctrl-label { font-size: 11px; color: #aaa; }
.ctrl-row { display: flex; align-items: center; gap: 8px; }
input[type=range] { flex: 1; accent-color: #7cbfff; }
.val { font-size: 11px; font-weight: 500; min-width: 30px; color: #fff; }
button { font-size: 12px; padding: 7px 14px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; cursor: pointer; }
button:active { transform: scale(0.97); }
#cam-btn { background: #1a6b3a; border-color: transparent; font-weight: 500; }
#cam-btn.on { background: #7a1a1a; }
#lock-btn { background: #7a5c00; border-color: transparent; font-weight: 500; }
#lock-btn.locked { background: #1a6b3a; }
select { font-size: 12px; padding: 5px 8px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; }
#status { font-size: 11px; color: #aaa; width: 100%; padding-top: 2px; }
#placeholder { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -60%); text-align: center; color: #888; }
#placeholder p { font-size: 14px; margin-top: 8px; }
#placeholder span { font-size: 11px; color: #555; display: block; margin-top: 4px; }
</style>
</head>
<body>
<div id="app">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay-canvas"></canvas>
  <div id="placeholder">
    <p>Tap Start Camera to begin</p>
    <span>Place paper on a dark surface for best tracking</span>
  </div>
  <div id="peek-bar">
    <button id="peek-btn" onclick="showControls()">&#8963; adjust</button>
  </div>
</div>

<div id="controls">
  <div class="ctrl-group" style="flex:0 0 auto; gap:6px;">
    <button id="cam-btn" onclick="startCamera()">Start camera</button>
    <button id="lock-btn" onclick="toggleLock()" disabled>Lock position</button>
  </div>
  <div class="ctrl-group" style="flex:0 0 auto;">
    <button onclick="document.getElementById('file-input').click()">Load reference</button>
    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="loadRef(event)">
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">Paper size</div>
    <div class="ctrl-row">
      <select id="paper-sel" onchange="redraw()">
        <option value="0">5.5x8.5 in</option>
        <option value="1">8x11 in</option>
        <option value="2">9x12 in</option>
        <option value="3">11x14 in</option>
        <option value="4">11x16 in</option>
        <option value="5">12x16 in</option>
        <option value="6">16x20 in</option>
      </select>
    </div>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">Grid divisions</div>
    <div class="ctrl-row">
      <select id="grid-sel" onchange="redraw()">
        <option value="off">No grid</option>
        <option value="4" selected>4x4</option>
        <option value="6">6x6</option>
        <option value="8">8x8</option>
      </select>
    </div>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">Photo opacity</div>
    <div class="ctrl-row">
      <input type="range" id="opacity" min="0" max="100" value="45" step="1" oninput="redraw()">
      <span class="val" id="opacity-val">45%</span>
    </div>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">Grid opacity</div>
    <div class="ctrl-row">
      <input type="range" id="grid-opacity" min="0" max="100" value="70" step="1" oninput="redraw()">
      <span class="val" id="grid-opacity-val">70%</span>
    </div>
  </div>
  <div id="status">— camera not started —</div>
</div>

<script>
const PAPERS=[
  {w:5.5,h:8.5},{w:8,h:11},{w:9,h:12},
  {w:11,h:14},{w:11,h:16},{w:12,h:16},{w:16,h:20}
];

let refImg=null,stream=null,detectInterval=null;
let detectedCorners=null,lockedRegion=null,isLocked=false;

const video=document.getElementById('video');
const canvas=document.getElementById('overlay-canvas');
const ctx=canvas.getContext('2d');

function getPaper(){return PAPERS[parseInt(document.getElementById('paper-sel').value)||0];}
function setStatus(msg){document.getElementById('status').textContent=msg;}

function hideControls(){
  document.getElementById('controls').style.display='none';
  document.getElementById('peek-bar').style.display='flex';
}
function showControls(){
  document.getElementById('controls').style.display='flex';
  document.getElementById('peek-bar').style.display='none';
}

function startCamera(){
  const btn=document.getElementById('cam-btn');
  if(stream){
    stream.getTracks().forEach(t=>t.stop());stream=null;
    video.srcObject=null;clearInterval(detectInterval);
    btn.textContent='Start camera';btn.classList.remove('on');
    document.getElementById('lock-btn').disabled=true;
    detectedCorners=null;lockedRegion=null;isLocked=false;
    updateLockBtn();showControls();setStatus('— camera stopped —');redraw();return;
  }
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:false})
    .then(s=>{
      stream=s;video.srcObject=s;
      document.getElementById('placeholder').style.display='none';
      btn.textContent='Stop camera';btn.classList.add('on');
      document.getElementById('lock-btn').disabled=false;
      video.onloadedmetadata=()=>{
        syncCanvas();
        detectInterval=setInterval(detectPaper,500);
        setStatus('Scanning for paper...');
      };
    }).catch(()=>alert('Camera access denied. Allow camera in Safari settings.'));
}

function toggleLock(){
  if(!detectedCorners)return;
  isLocked=!isLocked;
  if(isLocked){
    lockedRegion={...detectedCorners};
    setStatus('Locked');
    hideControls();
  } else {
    lockedRegion=null;
    setStatus('Scanning for paper...');
    showControls();
  }
  updateLockBtn();redraw();
}

function updateLockBtn(){
  const btn=document.getElementById('lock-btn');
  if(isLocked){btn.textContent='Unlock';btn.classList.add('locked');}
  else{btn.textContent='Lock position';btn.classList.remove('locked');}
}

function syncCanvas(){
  canvas.width=canvas.offsetWidth;
  canvas.height=canvas.offsetHeight;
}

function detectPaper(){
  if(!stream||isLocked)return;
  const W=video.videoWidth,H=video.videoHeight;
  if(!W||!H)return;
  const off=document.createElement('canvas');
  off.width=W;off.height=H;
  const oc=off.getContext('2d');
  oc.drawImage(video,0,0,W,H);
  const data=oc.getImageData(0,0,W,H).data;
  let minX=W,maxX=0,minY=H,maxY=0,count=0;
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    const i=(y*W+x)*4;
    const b=0.299*data[i]+0.587*data[i+1]+0.114*data[i+2];
    if(b>160){if(x<minX)minX=x;if(x>maxX)maxX=x;if(y<minY)minY=y;if(y>maxY)maxY=y;count++;}
  }
  const coverage=count/(W*H);
  const cw=canvas.width,ch=canvas.height;
  if(coverage>0.05&&coverage<0.85&&(maxX-minX)>W*0.2&&(maxY-minY)>H*0.2){
    detectedCorners={
      x:(minX/W)*cw,y:(minY/H)*ch,
      w:((maxX-minX)/W)*cw,h:((maxY-minY)/H)*ch
    };
    setStatus('Paper detected — tap Lock when it fits perfectly');
  } else {
    setStatus('Place paper on a dark surface — scanning...');
  }
  redraw();
}

function loadRef(e){
  const file=e.target.files[0];if(!file)return;
  const img=new Image();
  img.onload=()=>{refImg=img;redraw();};
  img.src=URL.createObjectURL(file);
}

function redraw(){
  syncCanvas();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const photoOpacity=parseInt(document.getElementById('opacity').value)/100;
  document.getElementById('opacity-val').textContent=Math.round(photoOpacity*100)+'%';
  const gridOpacity=parseInt(document.getElementById('grid-opacity').value)/100;
  document.getElementById('grid-opacity-val').textContent=Math.round(gridOpacity*100)+'%';
  const region=lockedRegion||detectedCorners||{x:canvas.width*0.05,y:canvas.height*0.05,w:canvas.width*0.9,h:canvas.height*0.9};
  if(refImg){
    ctx.globalAlpha=photoOpacity;
    const scale=Math.min(region.w/refImg.width,region.h/refImg.height);
    const dw=refImg.width*scale,dh=refImg.height*scale;
    ctx.drawImage(refImg,region.x+(region.w-dw)/2,region.y+(region.h-dh)/2,dw,dh);
    ctx.globalAlpha=1;
  }
  const gridVal=document.getElementById('grid-sel').value;
  if(gridVal!=='off'){
    const divisions=parseInt(gridVal);
    const paper=getPaper();
    const cellW=region.w/divisions,cellH=region.h/divisions;
    ctx.globalAlpha=gridOpacity;
    ctx.strokeStyle='rgba(255,255,80,1)';ctx.lineWidth=0.8;
    ctx.font='bold 10px -apple-system,sans-serif';ctx.fillStyle='rgba(255,255,80,1)';
    for(let i=1;i<divisions;i++){
      const x=Math.round(region.x+cellW*i);
      ctx.beginPath();ctx.moveTo(x,region.y);ctx.lineTo(x,region.y+region.h);ctx.stroke();
      ctx.fillText((paper.w/divisions*i).toFixed(1)+'"',x+2,region.y+13);
    }
    for(let j=1;j<divisions;j++){
      const y=Math.round(region.y+cellH*j);
      ctx.beginPath();ctx.moveTo(region.x,y);ctx.lineTo(region.x+region.w,y);ctx.stroke();
      ctx.fillText((paper.h/divisions*j).toFixed(1)+'"',region.x+3,y-3);
    }
    ctx.lineWidth=1.5;
    ctx.strokeRect(region.x,region.y,region.w,region.h);
    ctx.globalAlpha=1;
  }
  ctx.strokeStyle=isLocked?'rgba(100,255,150,0.9)':'rgba(255,200,50,0.9)';
  ctx.lineWidth=2;ctx.setLineDash([5,4]);
  ctx.strokeRect(region.x,region.y,region.w,region.h);
  ctx.setLineDash([]);
}

syncCanvas();
window.addEventListener('resize',()=>{syncCanvas();redraw();});
</script>
</body>
</html>
